  <title id="title">ATM OpenSpec Demo introductory video</title>
  <desc id="desc">A clickable preview card for the repository introductory video.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="52%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#0f766e"/>
